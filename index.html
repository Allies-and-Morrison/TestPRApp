ef Development Record", "Site context and analysis", "Stage 2 drawings: Site plans, GA plans/sections/elevations, Facade bay studies, Detailed core/unit plans", "Area/Accommodation Schedules", "Stage 2 Outline Specification", "Illustrative views and presentations", "AAM Housing Compliance Tracker", "AAM Design Risk Register", "AAM CDM Risk Register and site constraints plan", "Cleaning and Maintenance Strategy"] }, { title: "Completion of Stage", icon: 'check-circle', items: ["Complete the AAM Project Update Data Form to update database.", "Obtain Client sign-off to Stage 2 using AAM Stage 2 Sign Off template.", "Save pdf Stage 2 Report, Planning Application, DAS etc., into project folder: ARCHIVE.", "Update CURRENT drawings folder.", "Archive the Revit models aligned with Stage 2 deliverables.", "Review stage watchpoints: list outstanding items for Stage 3 start."] } ] },

ns/sections, Thermal line/air leakage drawings, Scope drawings (partitions, joinery, roofing, cladding, etc).", "Key facade bay studies (1:25 or 1:50) and typical facade details (1:5).", "Staircore drawings (1:25) and Apartment/Room layouts (1:50 / 1:25).", "Developed Outline Specification.", "Schedules: Project Brief, AAM Design Risk Register, Area Schedule, Maintenance Strategy, AAM CDM Risk Register.", "Other Consultants (Not AAM): Fire Strategy Report (Fire Engineer), Basement Waterproofing (Structural Engineer), Demolition (Structural), Plant replacement (MEP)."] }, { title: "Completion of Stage", icon: 'check-circle', items: ["Generally consistent with Completion of Stage 2 checklist (Sign off, Archive models, Update data forms).", "Stage 3+ Info: Additional info sometimes required for Stage 3 tender, including full Specification (minus workmanship clauses) and complete external envelope."] } ] },

        // --- HIGHLIGHT TEXT FUNCTION ---
function formatText(text) {
    if (!text) return '';
    let formatted = text;
    highlightDictionary.forEach(({ phrase, type, url }) => {
        let cssClass = "";
        let tooltip = "";
        if (type === 'template') { cssClass = "text-red-600 font-semibold cursor-help hover:underline"; tooltip = "Project specific document / standard template"; }
        if (type === 'new-template') { cssClass = "text-emerald-600 font-semibold cursor-help hover:underline"; tooltip = "Potential new template"; }
        if (type === 'tracker') { cssClass = "text-blue-600 font-semibold cursor-help hover:underline"; tooltip = "Knowledge Centre / Tracker Link"; }
        if (type === 'cpd') { cssClass = "text-purple-600 font-semibold cursor-help hover:underline"; tooltip = "Supporting info / CPD"; }

        const safePhrase = phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${safePhrase})`, 'g');
        
        // Create a link if URL exists, otherwise just span
        if (url) {
            formatted = formatted.replace(regex, `<a href="${url}" target="_blank" class="${cssClass}" title="${tooltip}">$1</a>`);
        } else {
            formatted = formatted.replace(regex, `<span class="${cssClass}" title="${tooltip}">$1</span>`);
        }
    });
    return formatted;
}

        function renderRibbon() {
            let html = '';
            appData.stages.forEach(stage => {
                html += `
                    <button onclick="setTab('${stage.id}')" class="flex flex-col items-center group flex-1 ${activeTab === stage.id ? 'opacity-100' : 'opacity-60 hover:opacity-100'} transition-opacity">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold mb-1 transition-colors ${activeTab === stage.id ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 group-hover:bg-slate-200'}">
                            ${stage.id}
                        </div>
                        <span class="text-xs text-center font-medium ${activeTab === stage.id ? 'text-blue-700' : 'text-slate-500'}">${stage.title}</span>
                    </button>
                `;
            });
            desktopRibbon.innerHTML = html;
        }

        function renderAccordion(title, iconName, items, isFirst) {
            // Check if search matches inside
            const q = searchQuery.toLowerCase();
            const hasMatch = q && (title.toLowerCase().includes(q) || items.some(i => i.toLowerCase().includes(q)));
            const shouldBeOpen = isFirst || hasMatch;

            let html = `<div class="mb-4 border rounded-lg overflow-hidden transition-all duration-200 ${hasMatch ? 'border-blue-300 ring-1 ring-blue-100' : 'border-slate-200'} accordion-wrapper">`;
            
            // Header button
            html += `
                <button class="accordion-btn w-full flex items-center justify-between p-4 text-left focus:outline-none transition-colors ${shouldBeOpen ? 'bg-slate-50' : 'bg-white hover:bg-slate-50'}">
                    <div class="flex items-center space-x-3">
                        <i data-feather="${iconName}" class="${shouldBeOpen ? 'text-blue-600' : 'text-slate-500'} w-5 h-5 accordion-main-icon"></i>
                        <h3 class="font-medium ${shouldBeOpen ? 'text-slate-900' : 'text-slate-700'}">${title}</h3>
                    </div>
                    <i data-feather="${shouldBeOpen ? 'chevron-down' : 'chevron-right'}" class="w-5 h-5 text-slate-400 accordion-chevron"></i>
                </button>
            `;

            // Content body
            html += `<div class="accordion-content p-4 bg-white border-t border-slate-100 ${shouldBeOpen ? '' : 'hidden'}"><ul class="space-y-3">`;
            
            items.forEach(item => {
                const isItemMatch = q && item.toLowerCase().includes(q);
                html += `
                    <li class="flex items-start space-x-3 text-slate-600 leading-relaxed p-2 rounded ${isItemMatch ? 'bg-blue-50/50' : ''}">
                        <div class="flex-shrink-0 mt-1.5 w-1.5 h-1.5 rounded-full bg-slate-400"></div>
                        <div>${formatText(item)}</div>
                    </li>
                `;
            });

            html += `</ul></div></div>`;
            return html;
        }

        function renderMainContent() {
            let html = '<div class="max-w-4xl animate-fade-in">';
            
            if (activeTab === 'intro') {
                html += `
                    <div class="mb-8">
                        <h1 class="text-3xl font-bold text-slate-900 mb-4">${appData.intro.title}</h1>
                        <div class="h-1 w-20 bg-blue-600 rounded"></div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 space-y-6">
                        ${appData.intro.content.map(p => `<p class="text-slate-700 text-lg leading-relaxed">${formatText(p)}</p>`).join('')}
                        
                        <div class="mt-8 p-6 bg-slate-50 rounded-lg border border-slate-100">
                            <h3 class="font-semibold text-slate-900 mb-3 flex items-center">
                                <i data-feather="info" class="w-5 h-5 mr-2 text-blue-600"></i> Color Highlight Key
                            </h3>
                            <ul class="space-y-2 text-sm text-slate-600">
                                <li><strong class="text-red-600">Red Text:</strong> Project specific documents / standard templates</li>
                                <li><strong class="text-emerald-600">Green Text:</strong> Potential new templates</li>
                                <li><strong class="text-blue-600">Blue Text:</strong> Links to Knowledge Centre / Data Trackers</li>
                                <li><strong class="text-purple-600">Purple Text:</strong> Links to supporting info / CPD talks</li>
                            </ul>
                        </div>
                    </div>
                `;
            } else if (activeTab === 'setup') {
                html += `
                    <div class="mb-8">
                        <h1 class="text-3xl font-bold text-slate-900 mb-4">${appData.setup.title}</h1>
                        <p class="text-slate-500 text-lg">Cross-stage protocols and initiation tasks.</p>
                    </div>
                    <div class="space-y-4">
                        ${appData.setup.sections.map((sec, idx) => 
                            renderAccordion(sec.subtitle ? `${sec.title} (${sec.subtitle})` : sec.title, 'tool', sec.items, idx === 0)
                        ).join('')}
                    </div>
                `;
            } else {
                const stage = appData.stages.find(s => s.id === activeTab);
                if (stage) {
                    html += `
                        <div class="mb-8">
                            <div class="flex items-center space-x-3 mb-4">
                                <span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-semibold tracking-wide">STAGE ${stage.id}</span>
                                <h1 class="text-3xl font-bold text-slate-900">${stage.title}</h1>
                            </div>
                            
                            <div class="bg-slate-900 rounded-xl p-6 shadow-md text-white border border-slate-800 mt-6 relative overflow-hidden">
                                <div class="absolute top-0 right-0 p-8 opacity-10"><i data-feather="flag" class="w-32 h-32"></i></div>
                                <h3 class="text-blue-400 font-semibold mb-2 uppercase tracking-wider text-sm">Core Outcome</h3>
                                <p class="text-xl font-medium leading-relaxed relative z-10">${stage.outcome}</p>
                            </div>
                            
                            ${stage.description ? `<p class="mt-6 text-slate-600 text-lg leading-relaxed bg-white p-5 rounded-lg border border-slate-200">${stage.description}</p>` : ''}
                        </div>
                        <div class="space-y-4 mt-8">
                            ${stage.sections.map((sec, idx) => renderAccordion(sec.title, sec.icon, sec.items, true)).join('')}
                        </div>
                    `;
                }
            }
            
            html += '</div>';
            mainContent.innerHTML = html;

            // Re-render icons for injected HTML
            feather.replace();
            attachAccordionListeners();
        }

        // --- INTERACTIVITY LOGIC ---
        function setTab(tabId) {
            activeTab = tabId;
            searchQuery = '';
            desktopSearch.value = '';
            mobileSearch.value = '';
            toggleMobileMenu(false);
            updateAll();
        }

        function handleSearch(e) {
            searchQuery = e.target.value;
            // Sync search bars
            if (e.target.id === 'desktop-search') mobileSearch.value = searchQuery;
            else desktopSearch.value = searchQuery;
            renderMainContent();
        }

        function toggleMobileMenu(forceState) {
            mobileMenuOpen = forceState !== undefined ? forceState : !mobileMenuOpen;
            if (mobileMenuOpen) {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('block');
                mobileOverlay.classList.remove('hidden');
                mobileMenuBtn.innerHTML = '<i data-feather="x"></i>';
            } else {
                sidebar.classList.add('hidden');
                sidebar.classList.remove('block');
                mobileOverlay.classList.add('hidden');
                mobileMenuBtn.innerHTML = '<i data-feather="menu"></i>';
            }
            feather.replace();
        }

        function attachAccordionListeners() {
            const btns = document.querySelectorAll('.accordion-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const content = this.nextElementSibling;
                    const chevron = this.querySelector('.accordion-chevron');
                    const mainIcon = this.querySelector('.accordion-main-icon');
                    const title = this.querySelector('h3');

                    if (content.classList.contains('hidden')) {
                        content.classList.remove('hidden');
                        this.classList.replace('bg-white', 'bg-slate-50');
                        this.classList.remove('hover:bg-slate-50');
                        mainIcon.classList.replace('text-slate-500', 'text-blue-600');
                        title.classList.replace('text-slate-700', 'text-slate-900');
                        chevron.setAttribute('data-feather', 'chevron-down');
                    } else {
                        content.classList.add('hidden');
                        this.classList.replace('bg-slate-50', 'bg-white');
                        this.classList.add('hover:bg-slate-50');
                        mainIcon.classList.replace('text-blue-600', 'text-slate-500');
                        title.classList.replace('text-slate-900', 'text-slate-700');
                        chevron.setAttribute('data-feather', 'chevron-right');
                    }
                    feather.replace();
                });
            });
        }

        function updateAll() {
            renderSidebar();
            renderRibbon();
            renderMainContent();
            feather.replace();
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            desktopSearch.addEventListener('input', handleSearch);
            mobileSearch.addEventListener('input', handleSearch);
            mobileMenuBtn.addEventListener('click', () => toggleMobileMenu());
            mobileOverlay.addEventListener('click', () => toggleMobileMenu(false));
            updateAll();
        });
    </script>
</body>
</html>
